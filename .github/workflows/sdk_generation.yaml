name: Generate SDK
permissions:
  checks: write
  contents: write
  pull-requests: write
  statuses: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force regeneration of SDK
        type: boolean
        default: false
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [main]
    paths:
      - ".stainless/**"

jobs:
  generate:
    name: Generate SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dagger/dagger-for-github@8.0.0
        id: dagger-setup

      - run: pip install dagger-io

      - name: Validate secrets
        run: |
          if [ -z "$STAINLESS_API_KEY" ]; then
            echo "ERROR: STAINLESS_API_KEY secret is not set"
            echo "Please add STAINLESS_API_KEY to repository secrets"
            exit 1
          fi
          echo "✓ STAINLESS_API_KEY is set"
        env:
          STAINLESS_API_KEY: ${{ secrets.STAINLESS_API_KEY }}

      - name: Generate SDK via Dagger
        id: generate
        continue-on-error: true
        run: >
          dagger run python ci/pipeline.py generate
          --force=${{ github.event.inputs.force || 'false' }} 2>&1 | tee sdk-generation.log
        env:
          STAINLESS_API_KEY: ${{ secrets.STAINLESS_API_KEY }}

      - name: Display generation errors
        if: steps.generate.outcome == 'failure'
        run: |
          echo "=== SDK Generation Failed ==="
          echo "Full output from pipeline:"
          cat sdk-generation.log
          exit 1

      - name: Upload SDK generation logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: sdk-generation-logs
          path: sdk-generation.log
          retention-days: 30

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ github.token }}
          commit-message: "feat(sdk): regenerate apollo SDK"
          branch: gha/apollo-sdk-generation
          base: main
          title: "Apollo SDK — Regenerated"
          body: "Automated SDK regeneration via Dagger pipeline"
          delete-branch: true
          labels: |
            automated
            sdk
